databaseChangeLog:
  - changeSet:
      id: create-comment-report-data
      author: SapeginMihail
      changes:
        - createTable:
            tableName: comment_report_data
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_comment_report_data
                    nullable: false
              - column:
                  name: comment_id
                  type: BIGINT
              - column:
                  name: comment_text
                  type: TEXT
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: review_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: comment_report_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true

        - addForeignKeyConstraint:
            baseTableName: comment_report_data
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_crd_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: comment_report_data
            baseColumnNames: review_id
            referencedTableName: review
            referencedColumnNames: id
            constraintName: fk_crd_review
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: comment_report_data
            baseColumnNames: comment_report_id
            referencedTableName: comment_report
            referencedColumnNames: id
            constraintName: fk_crd_comment_report
            onDelete: CASCADE