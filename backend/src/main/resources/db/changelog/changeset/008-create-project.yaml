databaseChangeLog:
  - changeSet:
      id: 11-create-project
      author: SapeginMihail
      changes:
        - createTable:
            tableName: project
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: stack
                  type: TEXT
              - column:
                  name: is_private
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: organization_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: project
            baseColumnNames: organization_id
            referencedTableName: organization
            referencedColumnNames: id
            constraintName: fk_project_organization
            onDelete: CASCADE
