databaseChangeLog:
  - changeSet:
      id: 12-create-user-organization
      author: SapeginMihail
      changes:
        - createTable:
            tableName: user_organization
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: organization_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: organization_role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_admin
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: is_enabled
                  type: BOOLEAN
                  defaultValueBoolean: false

        - addForeignKeyConstraint:
            baseTableName: user_organization
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_organization_user
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: user_organization
            baseColumnNames: organization_id
            referencedTableName: organization
            referencedColumnNames: id
            constraintName: fk_user_organization_organization
            onDelete: CASCADE

        - addUniqueConstraint:
            tableName: user_organization
            columnNames: user_id, organization_id
            constraintName: uq_user_organization_user_org

        - createIndex:
            tableName: user_organization
            indexName: idx_user_organization_user_id
            columns:
              - column:
                  name: user_id

        - createIndex:
            tableName: user_organization
            indexName: idx_user_organization_organization_id
            columns:
              - column:
                  name: organization_id