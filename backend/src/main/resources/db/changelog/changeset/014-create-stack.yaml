databaseChangeLog:
  - changeSet:
      id: 14-stack
      author: SapeginMihail
      changes:
        - createTable:
            tableName: stack
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(255)

        - createTable:
            tableName: user_stack
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_stack
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: stack_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - addForeignKeyConstraint:
                  baseTableName: user_stack
                  baseColumnNames: user_id
                  referencedTableName: users
                  referencedColumnNames: id
                  constraintName: fk_user_stack_user

              - addForeignKeyConstraint:
                  baseTableName: user_stack
                  baseColumnNames: stack_id
                  referencedTableName: stack
                  referencedColumnNames: id
                  constraintName: fk_user_stack_stack