databaseChangeLog:
  - changeSet:
      id: add-project-id-to-task
      author: SapeginMihail
      changes:
        - addColumn:
            tableName: task
            columns:
              - column:
                  name: project_id
                  type: BIGINT

        - addForeignKeyConstraint:
            baseTableName: task
            baseColumnNames: project_id
            referencedTableName: project
            referencedColumnNames: id
            constraintName: fk_task_project