databaseChangeLog:
  - changeSet:
      id: 12-create-project-stack
      author: SapeginMihail
      changes:
        - createTable:
            tableName: project_stack
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: stack_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: project_stack
            baseColumnNames: project_id
            referencedTableName: project
            referencedColumnNames: id
            constraintName: fk_project_stack_project

        - addForeignKeyConstraint:
            baseTableName: project_stack
            baseColumnNames: stack_id
            referencedTableName: stack
            referencedColumnNames: id
            constraintName: fk_project_stack_stack
