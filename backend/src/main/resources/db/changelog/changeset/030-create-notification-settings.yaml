databaseChangeLog:
  - changeSet:
      id: create-notification-settings-table
      author: SapeginMihail
      changes:
        - createTable:
            tableName: notification_settings
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: review_assignments
                  type: BOOLEAN
              - column:
                  name: new_comments
                  type: BOOLEAN
              - column:
                  name: achievements
                  type: BOOLEAN
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    unique: true
                    foreignKeyName: fk_notification_settings_user
                    references: users(id)
                    deleteCascade: true