databaseChangeLog:
  - changeSet:
      id: 032-create-solution-tables
      author: SapeginMihail
      changes:
        - createTable:
            tableName: solution
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_solution
              - column:
                  name: reveal_author_after_review
                  type: BOOLEAN
              - column:
                  name: upload_type
                  type: VARCHAR(50)
              - column:
                  name: uploaded_at
                  type: TIMESTAMP
              - column:
                  name: task_id
                  type: BIGINT
        - addForeignKeyConstraint:
            baseTableName: solution
            baseColumnNames: task_id
            referencedTableName: task
            referencedColumnNames: id
            constraintName: fk_solution_task

        - createTable:
            tableName: solution_manual_text
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_solution_manual_text
              - column:
                  name: solution_id
                  type: BIGINT
              - column:
                  name: file_name
                  type: VARCHAR(500)
              - column:
                  name: language
                  type: VARCHAR(255)
              - column:
                  name: content
                  type: TEXT
        - addForeignKeyConstraint:
            baseTableName: solution_manual_text
            baseColumnNames: solution_id
            referencedTableName: solution
            referencedColumnNames: id
            constraintName: fk_solution_manual_text_solution