databaseChangeLog:
  - changeSet:
      id: 14-create-review
      author: SapeginMihail
      changes:
        - createTable:
            tableName: review
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: body
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            baseTableName: review
            baseColumnNames: task_id
            referencedTableName: task
            referencedColumnNames: id
            constraintName: fk_review_task
            onDelete: CASCADE

        - addForeignKeyConstraint:
            baseTableName: review
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_review_user
            onDelete: CASCADE