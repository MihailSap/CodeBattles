databaseChangeLog:
  - changeSet:
      id: 10-create-organization
      author: SapeginMihail
      changes:
        - createTable:
            tableName: organization
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT