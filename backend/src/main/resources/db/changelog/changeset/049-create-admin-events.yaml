databaseChangeLog:
  - changeSet:
      id: 049-create-admin-events
      author: Antigravity
      changes:
        - createTable:
            tableName: admin_event
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: actor_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_admin_event_actor
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: target_user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_admin_event_target_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: comment_id
                  type: BIGINT
              - column:
                  name: comment_text_preview
                  type: VARCHAR(1000)
              - column:
                  name: removed_comment_id
                  type: BIGINT
              - column:
                  name: reason
                  type: VARCHAR(500)
              - column:
                  name: decision
                  type: VARCHAR(50)
              - column:
                  name: consequence
                  type: VARCHAR(500)
              - column:
                  name: penalty_points
                  type: INT
              - column:
                  name: target_title
                  type: VARCHAR(500)
              - column:
                  name: target_url
                  type: VARCHAR(500)
              - column:
                  name: target_project_id
                  type: BIGINT
              - column:
                  name: target_task_id
                  type: BIGINT
              - column:
                  name: target_review_id
                  type: BIGINT
              - column:
                  name: scope_type
                  type: VARCHAR(50)
              - column:
                  name: scope_name
                  type: VARCHAR(500)
              - column:
                  name: scope_url
                  type: VARCHAR(500)
              - column:
                  name: scope_organization_id
                  type: BIGINT
              - column:
                  name: scope_project_id
                  type: BIGINT
              - column:
                  name: previous_value
                  type: VARCHAR(1000)
              - column:
                  name: new_value
                  type: VARCHAR(1000)
              - column:
                  name: details
                  type: VARCHAR(1000)
