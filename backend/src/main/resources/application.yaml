spring:
  application:
    name: backend

  config:
    import: classpath:stack.yaml

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: none

  liquibase:
    enabled: true

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:100MB}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user

  mail:
    host: ${SPRING_MAIL_HOST:host.docker.internal}
    port: ${SPRING_MAIL_PORT:25}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS_ENABLE:false}
            required: ${SPRING_MAIL_STARTTLS_REQUIRED:false}
          connectiontimeout: ${SPRING_MAIL_CONNECTION_TIMEOUT:5000}
          timeout: ${SPRING_MAIL_TIMEOUT:5000}
          writetimeout: ${SPRING_MAIL_WRITE_TIMEOUT:5000}

server:
  forward-headers-strategy: framework
  tomcat:
    redirect-context-root: false

app:
  public-url: ${APP_PUBLIC_URL}
  mail:
    from-address: ${APP_MAIL_FROM_ADDRESS:${EMAIL_ADDRESS:noreply@codemasters.mooo.com}}
    from-name: ${APP_MAIL_FROM_NAME:CodeMasters}
    send-timeout-ms: ${APP_MAIL_SEND_TIMEOUT_MS:10000}

ai:
  provider: ${AI_PROVIDER:openrouter}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    site-url: ${OPENROUTER_SITE_URL:}
    site-name: ${OPENROUTER_SITE_NAME:CodeBattles}

jwt:
  secret:
    access: ${JWT_SECRET_ACCESS}
    refresh: ${JWT_SECRET_REFRESH}
