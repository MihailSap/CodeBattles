spring:
  application:
    name: backend

  config:
    import: classpath:stack.yaml

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    hibernate:
      ddl-auto: none

  liquibase:
    enabled: true

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:100MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:100MB}

  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope:
              - user:email
              - read:user

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_ADDRESS}
    password: ${EMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  public-url: ${APP_PUBLIC_URL}

ai:
  provider: ${AI_PROVIDER:openrouter}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    model: ${OPENROUTER_MODEL:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    site-url: ${OPENROUTER_SITE_URL:}
    site-name: ${OPENROUTER_SITE_NAME:CodeBattles}

jwt:
  secret:
    access: ${JWT_SECRET_ACCESS}
    refresh: ${JWT_SECRET_REFRESH}
