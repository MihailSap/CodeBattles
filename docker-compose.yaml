services:
  nginx:
    image: nginx:1.25-alpine
    container_name: code_battles_nginx
    ports:
      - "${NGINX_PUBLISHED_PORT:-80:80}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    container_name: code_battles_frontend
    restart: unless-stopped

  backend:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    build:
      context: ./backend
    container_name: code_battles_backend
    volumes:
      - backend_uploads:/app/uploads
    environment:
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET_ACCESS: ${JWT_SECRET_ACCESS}
      JWT_SECRET_REFRESH: ${JWT_SECRET_REFRESH}
      EMAIL_ADDRESS: ${EMAIL_ADDRESS:-}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-host.docker.internal}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-25}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      SPRING_MAIL_SMTP_AUTH: ${SPRING_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_STARTTLS_ENABLE: ${SPRING_MAIL_STARTTLS_ENABLE:-false}
      SPRING_MAIL_STARTTLS_REQUIRED: ${SPRING_MAIL_STARTTLS_REQUIRED:-false}
      SPRING_MAIL_CONNECTION_TIMEOUT: ${SPRING_MAIL_CONNECTION_TIMEOUT:-5000}
      SPRING_MAIL_TIMEOUT: ${SPRING_MAIL_TIMEOUT:-5000}
      SPRING_MAIL_WRITE_TIMEOUT: ${SPRING_MAIL_WRITE_TIMEOUT:-5000}
      APP_MAIL_FROM_ADDRESS: ${APP_MAIL_FROM_ADDRESS:-noreply@codemasters.mooo.com}
      APP_MAIL_FROM_NAME: ${APP_MAIL_FROM_NAME:-CodeMasters}
      APP_MAIL_SEND_TIMEOUT_MS: ${APP_MAIL_SEND_TIMEOUT_MS:-10000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-}
      OPENROUTER_SITE_NAME: ${OPENROUTER_SITE_NAME:-CodeBattles}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    container_name: code_battles_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  backend_uploads:
